name: Verification

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  deterministic-local-checks:
    name: Deterministic local verification
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Lint
        run: npm run lint

      - name: Verify v0.1 evidence baseline
        run: npm run verify:v0.1

      - name: Verify v0.2 provider baseline
        run: npm run verify:v0.2:providers

      - name: Verify post-v0.2 baseline
        run: npm run verify:post-v0.2

      - name: Verify dependency upgrade plan
        run: npm run verify:dependency-upgrade-plan

      - name: Summarize dependency audit
        run: npm run audit:summary

      - name: Verify v0.3 evidence pack contract
        run: npm run verify:v0.3:evidence

      - name: Verify v0.3 runtime evidence manifest
        run: npm run verify:v0.3:runtime-evidence

      - name: Verify v0.3 evidence inspector
        run: npm run verify:v0.3:inspect-evidence

      - name: Verify v0.3 release readiness
        run: npm run verify:v0.3:release

      - name: Verify v0.4 CI workflow boundary
        run: npm run verify:v0.4:ci-workflow
